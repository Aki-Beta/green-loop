<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green-Loop • Plataforma Ambiental</title>
</head>
<body>

    <div id="toast-container"></div>

    <div class="contenedor-pantalla" id="contenedor-principal-layout">
        
        <nav id="navbar" style="display: none; margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1c352a;">
                <a href="#/dashboard" data-link style="color: #34d399; font-weight: bold; text-decoration: none; font-size: 18px;">Green-Loop</a>
                <div id="nav-links" style="display: flex; gap: 15px;"></div>
                <div id="user-menu" style="display: flex; align-items: center; gap: 10px;"></div>
            </div>
            <div style="text-align: right; padding-top: 5px;">
                <span id="api-status" style="color: #64748b; font-size: 11px;">🔄 Verificando API...</span>
            </div>
        </nav>

        <main id="app">
            <div style="text-align: center; padding: 40px; color: #34d399;">
                <h2>Cargando sistema...</h2>
            </div>
        </main>

    </div>

    <script>
        window.Icons = {
            get: (name) => {
                const icons = {
                    'users': '👥', 'plus-circle': '➕', 'filter': '🔍', 
                    'chevron-left': '◀', 'chevron-right': '▶', 'times': '❌', 
                    'user-plus': '👤+', 'save': '💾', 'edit': '✏️', 
                    'user-slash': '🚫', 'user-check': '✅', 'trash': '🗑️',
                    'spinner': '⏳', 'sign-out-alt': '🚪'
                };
                return icons[name] || '•';
            }
        };
    </script>
    
   <!-- Rutas relativas corregidas (sin el prefijo /frontend/) -->
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <script src="js/views/login.js"></script>
    <script src="js/views/register.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/cargas.js"></script>
    <script src="js/views/certificados.js"></script>
    <script src="js/views/solicitudes.js"></script>
    <script src="js/views/reportes.js"></script>
    <script src="js/views/usuarios.js"></script>
    <script src="js/views/camiones.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
