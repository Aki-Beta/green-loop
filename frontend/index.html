<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Loop - Gestión de Residuos Sólidos</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',
                            500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <nav class="bg-primary-700 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fas fa-leaf text-2xl mr-2"></i>
                    <span class="font-bold text-xl">Green Loop</span>
                </div>
                <div class="hidden md:flex items-center space-x-6" id="nav-links">
                </div>
                <div class="flex items-center" id="user-menu">
                </div>
            </div>
        </div>
    </nav>

    <main id="app" class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-primary-500 border-t-transparent"></div>
        </div>
    </main>

    <footer class="bg-gray-800 text-gray-400 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>Green Loop - Sistema de Trazabilidad de Residuos Sólidos</p>
        </div>
    </footer>

    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- IMPORTANTE: orden de carga (helpers y api primero, luego router, luego vistas, luego app.js al final) -->
    <script src="js/utils/helpers.js"></script>
    <script src="js/api.js"></script>
    <script src="js/router.js"></script>
    <script src="js/views/login.js"></script>
    <script src="js/views/register.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/users.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
